<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kirkogotchi</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c41e3a">
  <meta name="description" content="Raise your own pixel Charlie Kirk. Keep him fed, keep him tweeting, keep his face the right size.">
  <meta property="og:title" content="Kirkogotchi">
  <meta property="og:description" content="Raise your own pixel Charlie Kirk. We Are Charlie Kirk.">
  <meta property="og:type" content="website">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
    body { background: #080e1a; }
    #loading { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #080e1a; z-index: 9999; font-family: 'Bangers', cursive; color: #fff; transition: opacity 0.3s; }
    #loading .title { font-size: 32px; letter-spacing: 4px; text-shadow: 0 2px 8px #0008, 0 0 12px #c41e3a55; margin-bottom: 12px; }
    #loading .fact { font-size: 10px; font-family: 'Press Start 2P', monospace; color: #fff6; max-width: 280px; text-align: center; line-height: 1.8; }
    #loading .spinner { width: 24px; height: 24px; border: 3px solid #c41e3a33; border-top-color: #c41e3a; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div class="title">KIRKOGOTCHI</div>
    <div class="fact" id="kirk-fact">Loading facts and freedom...</div>
    <script>
      var facts = ["Preparing hamberders...", "Calibrating clout meters...", "We Are Charlie Kirk."];
      var fi = 0;
      setInterval(function() { fi = (fi + 1) % facts.length; document.getElementById('kirk-fact').textContent = facts[fi]; }, 1500);
    </script>
  </div>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" src="kirkogotchi.jsx"></script>
  <script type="text/babel">
    const App = window.Kirkogotchi;
    const _root = ReactDOM.createRoot(document.getElementById('root'));
    _root.render(<App />);
    // Hide loading screen
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el) { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 300); }
    }, 100);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
